name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python lint and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: ingestion
        run: uv sync --all-extras

      - name: Ruff — lint
        working-directory: ingestion
        run: uv run ruff check src/ tests/

      - name: Black — format check
        working-directory: ingestion
        run: uv run black --check src/ tests/

      - name: Pytest — run tests
        working-directory: ingestion
        run: uv run pytest tests/ -v --tb=short

  dag-checks:
    name: Airflow DAG validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate DAG YAML files
        run: |
          pip install yamllint
          yamllint airflow/dags/ \
            -d "{extends: relaxed, rules: {line-length: {max: 120}}}" \
            || true

      - name: Check DAG Python syntax
        run: |
          python -m py_compile airflow/dags/citybikes_pipeline.py
          python -m py_compile airflow/dags/citybikes_monthly_snapshot.py
          echo "DAG syntax check passed"
