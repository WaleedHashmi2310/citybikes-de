# ============================================================
# CityBikes DE — Local Development Stack
# ============================================================
# This compose file is for testing the ingestion container locally.
#
# For Airflow local development, use Astro CLI instead:
#   cd airflow && astro dev start
#
# Usage:
#   Test ingestion locally:
#   docker compose -f docker/docker-compose.yml run --rm ingestion
# ============================================================

services:

  ingestion:
    build:
      context: .
      dockerfile: docker/ingestion/Dockerfile
    container_name: citybikes-ingestion-local
    environment:
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      LOCAL_STORAGE_PATH: ${LOCAL_STORAGE_PATH:-/tmp/citybikes}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCS_BUCKET_RAW: ${GCS_BUCKET_RAW}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp-key/credentials.json
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS}:/gcp-key/credentials.json:ro
      - /tmp/citybikes:/tmp/citybikes
