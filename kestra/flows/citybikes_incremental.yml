id: citybikes_incremental
namespace: citybikes.prod

description: |
  Fetches bikeshare station data from the CityBikes API for 4 European
  cities and writes Parquet files to GCS raw zone.
  Runs 3 times daily: 08:00, 13:00, 19:00 UTC.

labels:
  environment: prod
  pipeline: ingestion

triggers:
  - id: daily_schedule
    type: io.kestra.plugin.core.trigger.Schedule
    cron: "0 8,13,19 * * *"

tasks:
  - id: run_ingestion_job
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        gcloud run jobs execute citybikes-ingestion \
          --region=europe-west3 \
          --project=citybikes-de \
          --wait
    docker:
      image: google/cloud-sdk:slim

  - id: log_completion
    type: io.kestra.plugin.core.log.Log
    message: "Ingestion complete at {{ execution.startDate }}"

errors:
  - id: notify_failure
    type: io.kestra.plugin.core.log.Log
    message: "FAILED: {{ error.message }}"
