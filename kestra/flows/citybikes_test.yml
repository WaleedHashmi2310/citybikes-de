id: citybikes_test
namespace: citybikes.dev

description: |
  Smoke test flow. Confirms Kestra is running and environment
  variables are reachable. Trigger manually only.

tasks:
  - id: print_config
    type: io.kestra.plugin.core.log.Log
    message: |
      Kestra is running.
      GCP Project: {{ envs.GCP_PROJECT_ID }}
      GCS Raw bucket: {{ envs.GCS_BUCKET_RAW }}
      Storage backend: {{ envs.STORAGE_BACKEND }}
